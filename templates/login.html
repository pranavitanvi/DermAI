{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Decorative Orbs -->
    <div
        class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000">
    </div>

    <div
        class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-2xl p-10 rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-white z-10 animate-fade-in-up">
        <div class="text-center">
            <div
                class="mx-auto h-20 w-20 bg-gradient-to-br from-blue-50 to-indigo-50 text-medical-blue flex items-center justify-center rounded-2xl shadow-inner border border-blue-100 group">
                <i
                    class="fa-solid fa-shield-virus text-4xl group-hover:scale-110 transition-transform duration-300"></i>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-slate-900 tracking-tight">
                Welcome back
            </h2>
            <p class="mt-2 text-sm text-slate-500 font-medium">
                Sign in to access your healthcare dashboard
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('login') }}" method="POST">
            {% if error %}
            <div
                class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 shadow-sm animate-pulse">
                <i class="fa-solid fa-circle-exclamation text-lg"></i> {{ error }}
            </div>
            {% endif %}

            <div class="space-y-5">
                <div>
                    <label for="email-address" class="text-sm font-bold text-slate-700 block mb-2">Email address</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-medical-blue transition-colors">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input id="email-address" name="email" type="email" autocomplete="email" required
                            class="appearance-none rounded-xl w-full px-4 py-4 pl-11 border border-slate-200 bg-slate-50/50 text-slate-900 font-medium focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-medical-blue focus:bg-white transition-all shadow-sm placeholder-slate-400"
                            placeholder="Enter your email">
                    </div>
                </div>
                <div>
                    <label for="password" class="text-sm font-bold text-slate-700 block mb-2">Password</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-medical-blue transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                            class="appearance-none rounded-xl w-full px-4 py-4 pl-11 border border-slate-200 bg-slate-50/50 text-slate-900 font-medium focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-medical-blue focus:bg-white transition-all shadow-sm placeholder-slate-400"
                            placeholder="••••••••">
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit"
                    class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-base font-bold rounded-xl text-white bg-gradient-to-r from-medical-blue to-indigo-600 hover:from-indigo-600 hover:to-purple-600 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 shadow-lg shadow-indigo-500/30 hover:shadow-xl hover:-translate-y-0.5 transition-all text-center">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-4">
                        <i
                            class="fa-solid fa-arrow-right-to-bracket text-blue-200 group-hover:text-white transition-colors duration-200"></i>
                    </span>
                    Sign In to Dashboard
                </button>
            </div>
            <div class="text-center text-sm font-medium mt-6 pb-2">
                <span class="text-slate-500">Don't have an account?</span>
                <a href="{{ url_for('register') }}"
                    class="font-bold text-medical-blue hover:text-indigo-600 transition-colors ml-1 decoration-2 underline-offset-4 hover:underline">Create
                    one</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
